<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Minimalist outer circle border -->
  <circle cx="50" cy="50" r="46" stroke="#c8cad0" stroke-width="2" opacity="0.15" />
  <!-- Minimalist center core dot -->
  <circle cx="50" cy="50" r="5" fill="#c8cad0" />
  <!-- Wave ripple 1 -->
  <circle cx="50" cy="50" r="16" stroke="#c8cad0" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.45" />
  <!-- Wave ripple 2 -->
  <circle cx="50" cy="50" r="30" stroke="#c8cad0" stroke-width="1.5" opacity="0.8" />
  <!-- Wave ripple 3 -->
  <circle cx="50" cy="50" r="42" stroke="#c8cad0" stroke-width="1" stroke-dasharray="2 2" opacity="0.3" />
</svg>
